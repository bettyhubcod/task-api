stages:
  - test
  - build
  - docker

test:
  stage: test
  image: maven:3.9-eclipse-temurin-17
  script:
    - mvn test
  only:
    - develop

build:
  stage: build
  image: maven:3.9-eclipse-temurin-17
  script:
    - mvn package -DskipTests
  artifacts:
    paths:
      - target/*.jar
  only:
    - develop

docker:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
    - docker build -t $DOCKER_IMAGE .
    - docker push $DOCKER_IMAGE
  only:
    - develop